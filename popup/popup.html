<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Main view -->
    <section class="view" id="mainView">
      <header class="header">
        <div class="header-left">
          <span class="brand-dot"></span>
          <h1>Shortlist</h1>
          <span class="stats" id="stats"></span>
        </div>
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="2"></circle>
            <path d="M13.5 8a5.5 5.5 0 0 0-.1-1.1l1.2-.9-1-1.7-1.4.5a5.5 5.5 0 0 0-1.9-1.1L10 2H8l-.3 1.6a5.5 5.5 0 0 0-1.9 1.1l-1.4-.5-1 1.7 1.2.9a5.5 5.5 0 0 0 0 2.2l-1.2.9 1 1.7 1.4-.5a5.5 5.5 0 0 0 1.9 1.1L8 14h2l.3-1.6a5.5 5.5 0 0 0 1.9-1.1l1.4.5 1-1.7-1.2-.9c.07-.36.1-.73.1-1.1z"></path>
          </svg>
        </button>
      </header>

      <div class="search-wrap">
        <svg class="search-icon" width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="7" cy="7" r="5"></circle>
          <line x1="11" y1="11" x2="14" y2="14"></line>
        </svg>
        <input id="searchInput" class="search-input" type="text" placeholder="Search shortlist..." autocomplete="off" />
        <kbd class="kbd">⌘F</kbd>
      </div>

      <div class="filters">
        <button class="chip" data-filter="all">All</button>
        <button class="chip" data-filter="pending">
          Notion
          <span class="chip-dot" id="pendingDot" style="display:none"></span>
        </button>
        <button class="chip" data-filter="unrated">Unrated</button>
        <button class="chip" data-filter="rated">Rated</button>
        <button class="chip" data-filter="applied">Applied</button>
        <button class="chip" data-filter="rejected">Rejected</button>
        <div class="filters-spacer"></div>
        <select id="sortBy" class="sort-select" aria-label="Sort by">
          <option value="rating">★ Rating</option>
          <option value="shortlistedAt">Recent</option>
          <option value="title">A–Z</option>
        </select>
      </div>

      <div class="job-list" id="jobList"></div>

      <div class="empty" id="empty" style="display:none">
        <div class="empty-icon">⌘</div>
        <p class="empty-title">No jobs shortlisted</p>
        <p class="empty-sub">Click + on any Upwork job card to add it.</p>
      </div>

      <footer class="footer">
        <button id="openAllBtn" class="btn-primary">Open in tabs</button>
        <button id="clearBtn" class="btn-ghost" title="Clear list">Clear</button>
      </footer>
    </section>

    <!-- Settings view -->
    <section class="view" id="settingsView" style="display:none">
      <header class="header">
        <div class="header-left">
          <button class="icon-btn back-btn" id="backBtn" title="Back">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="10 13 5 8 10 3"></polyline>
            </svg>
          </button>
          <h1>Settings</h1>
        </div>
      </header>

      <div class="settings-body">
        <div class="settings-section">
          <h2 class="settings-h">Notion sync</h2>
          <p class="settings-desc">When you submit a proposal, the job is auto-logged to your Notion Applications database.</p>

          <label class="field">
            <span class="field-label">Integration token</span>
            <input type="password" id="notionToken" class="input" placeholder="ntn_•••••••••••" autocomplete="off" />
          </label>

          <label class="field">
            <span class="field-label">Database ID</span>
            <input type="text" id="notionDbId" class="input" placeholder="3444fc05-e31f-8128-906d-..." autocomplete="off" />
          </label>

          <div class="settings-actions">
            <button id="testNotion" class="btn-secondary">Test connection</button>
            <button id="saveNotion" class="btn-primary">Save</button>
          </div>

          <div class="status-line" id="notionStatus"></div>
        </div>
      </div>
    </section>

    <!-- Clear confirm modal -->
    <div class="modal-backdrop" id="clearConfirm" style="display:none">
      <div class="modal">
        <p class="modal-title">Clear entire shortlist?</p>
        <p class="modal-sub">This cannot be undone.</p>
        <div class="modal-actions">
          <button id="clearNo" class="btn-ghost">Cancel</button>
          <button id="clearYes" class="btn-danger">Clear all</button>
        </div>
      </div>
    </div>

    <!-- Notion review/push detail panel -->
    <section class="view detail-view" id="detailView" style="display:none">
      <header class="header">
        <div class="header-left">
          <button class="icon-btn back-btn" id="detailBack" title="Back">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="10 13 5 8 10 3"></polyline>
            </svg>
          </button>
          <h1>Review &amp; push</h1>
        </div>
        <span class="status-pill" id="detailStatus"></span>
      </header>

      <div class="detail-body" id="detailBody"></div>

      <footer class="footer">
        <button id="detailPush" class="btn-primary">Push to Notion</button>
        <button id="detailRemove" class="btn-ghost" title="Remove from queue">Remove</button>
      </footer>
    </section>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
